<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>好明设计 · 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --hue: 220; --sat: 20%; --lig: 8%;
      --accent: hsl(var(--hue), 60%, 65%);
      --text-primary: #e8e4df;
      --text-secondary: rgba(232, 228, 223, 0.5);
      --transition-speed: 1.2s;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: hsl(var(--hue), var(--sat), var(--lig));
      color: var(--text-primary);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      transition: background var(--transition-speed) ease;
      overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 0%, hsla(var(--hue), 50%, 40%, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, hsla(calc(var(--hue) + 30), 40%, 30%, 0.1) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.4;
    }

    /* AUTH CHECK */
    .auth-required {
      position: fixed; inset: 0; z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
    }
    .auth-required.hidden { display: none; }
    .auth-box {
      background: rgba(20,18,15,0.9); border: 1px solid rgba(232,228,223,0.15);
      border-radius: 16px; padding: 2rem; max-width: 320px; width: 90%;
      text-align: center;
    }
    .auth-title {
      font-family: 'Playfair Display', serif; font-size: 1.3rem;
      font-weight: 700; margin-bottom: 1rem;
    }
    .auth-text {
      font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1.5rem;
    }
    .auth-btn {
      background: var(--accent); color: #000; border: none;
      border-radius: 8px; padding: 0.75rem 1.5rem;
      font-family: 'DM Mono', monospace; font-size: 0.8rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; font-weight: 600;
    }
    .auth-btn:hover { opacity: 0.8; }

    header { position: relative; z-index: 10; padding: 2rem 2rem 1.5rem; text-align: center; }
    .header-inner { max-width: 800px; margin: 0 auto; }
    .site-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; letter-spacing: -0.02em; }
    .site-title em { font-style: italic; font-weight: 400; color: var(--accent); }
    .admin-badge { display: inline-flex; align-items: center; gap: 0.4rem; margin: 1rem auto 0; padding: 0.35rem 1rem; border: 1px solid hsla(var(--hue), 50%, 50%, 0.3); border-radius: 2rem; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); background: hsla(var(--hue), 50%, 50%, 0.08); }
    .admin-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .admin-panel { position: relative; z-index: 10; max-width: 800px; margin: 0 auto; padding: 0 1.5rem 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .admin-panel { grid-template-columns: 1fr; } }
    .panel-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(232,228,223,0.08); border-radius: 16px; padding: 1.25rem; }
    .panel-title { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 0.75rem; }

    .upload-box { border: 1.5px dashed rgba(232,228,223,0.2); border-radius: 12px; padding: 2rem 1.5rem; text-align: center; cursor: pointer; transition: all 0.4s ease; position: relative; }
    .upload-box:hover, .upload-box.drag-over { border-color: var(--accent); background: hsla(var(--hue),50%,50%,0.05); }
    .upload-box input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-icon { font-size: 1.5rem; margin-bottom: 0.5rem; display: block; }
    .upload-text { font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-secondary); }
    .upload-hint { font-size: 0.6rem; color: rgba(232,228,223,0.3); margin-top: 0.4rem; }
    .upload-progress { height: 2px; background: var(--accent); width: 0%; border-radius: 2px; margin-top: 0.6rem; transition: width 0.3s ease; }

    .quick-add input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(232,228,223,0.12); border-radius: 8px; padding: 0.6rem 0.8rem; color: var(--text-primary); font-family: 'DM Mono', monospace; font-size: 0.75rem; outline: none; transition: border-color 0.3s; margin-bottom: 0.5rem; }
    .quick-add input:focus { border-color: var(--accent); }
    .quick-add input::placeholder { color: rgba(232,228,223,0.25); }
    .tag-select { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
    .tag-option { padding: 0.25rem 0.7rem; border-radius: 2rem; border: 1px solid rgba(232,228,223,0.15); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; color: var(--text-secondary); }
    .tag-option.selected { border-color: var(--accent); color: var(--accent); background: hsla(var(--hue),50%,50%,0.1); }
    .quick-add .btn { width: 100%; background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 0.6rem; font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
    .quick-add .btn:hover { opacity: 0.8; }
    .quick-add .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .manifest-section { grid-column: 1/-1; }
    .manifest-section textarea { width: 100%; height: 80px; background: rgba(0,0,0,0.2); border: 1px solid rgba(232,228,223,0.1); border-radius: 8px; color: var(--text-secondary); font-family: 'DM Mono', monospace; font-size: 0.6rem; padding: 0.6rem; resize: none; outline: none; margin-bottom: 0.5rem; }
    .btn-row { display: flex; gap: 0.5rem; }
    .btn-row button { flex: 1; padding: 0.55rem; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; border: 1px solid rgba(232,228,223,0.15); background: rgba(255,255,255,0.05); color: var(--text-secondary); }
    .btn-row button:hover { opacity: 0.8; }
    .btn-row .btn-primary { background: var(--accent); color: #000; border-color: transparent; }

    .gallery-wrapper { position: relative; z-index: 10; max-width: 1600px; margin: 0 auto; padding: 0 1.5rem 4rem; }
    .masonry { columns: 4; column-gap: 1rem; }
    @media (max-width: 1200px) { .masonry { columns: 3; } }
    @media (max-width: 800px)  { .masonry { columns: 2; } }
    @media (max-width: 480px)  { .masonry { columns: 1; } }
    .card { break-inside: avoid; margin-bottom: 1rem; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; transform: translateY(0); transition: transform 0.5s cubic-bezier(0.23,1,0.32,1), box-shadow 0.5s ease; }
    .card:hover { transform: translateY(-6px); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .card img { width: 100%; display: block; transition: transform 0.6s cubic-bezier(0.23,1,0.32,1); }
    .card:hover img { transform: scale(1.04); }
    .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%); opacity: 0; transition: opacity 0.4s ease; display: flex; align-items: flex-end; justify-content: space-between; padding: 1.25rem; }
    .card:hover .card-overlay { opacity: 1; }
    .card-info { transform: translateY(8px); transition: transform 0.4s ease; flex: 1; }
    .card:hover .card-info { transform: translateY(0); }
    .card-title { font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 600; color: #fff; line-height: 1.3; }
    .card-tag { display: inline-block; margin-top: 0.35rem; font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); background: rgba(0,0,0,0.3); padding: 0.15rem 0.55rem; border-radius: 2rem; }
    .card-actions { display: flex; flex-direction: column; gap: 0.35rem; align-items: center; }
    .card-btn { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15); color: #fff; width: 28px; height: 28px; border-radius: 50%; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(0.7); transition: all 0.3s ease; }
    .card:hover .card-btn { opacity: 1; transform: scale(1); }
    .card-btn:hover { background: rgba(220,60,60,0.85); transform: scale(1.1) !important; }
    .card-btn.copy-btn:hover { background: rgba(60,180,100,0.85); }

    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px); background: rgba(20,18,15,0.95); border: 1px solid rgba(232,228,223,0.15); color: var(--text-primary); padding: 0.75rem 1.5rem; border-radius: 3rem; font-size: 0.75rem; letter-spacing: 0.08em; z-index: 2000; transition: transform 0.4s cubic-bezier(0.23,1,0.32,1), opacity 0.4s ease; opacity: 0; pointer-events: none; white-space: nowrap; backdrop-filter: blur(10px); }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: hsla(140,60%,50%,0.4); }
    .toast.error { border-color: hsla(0,70%,55%,0.4); }

    footer { position: relative; z-index: 10; text-align: center; padding: 2rem; font-size: 0.65rem; letter-spacing: 0.15em; color: var(--text-secondary); border-top: 1px solid rgba(232,228,223,0.06); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    header, .admin-panel { animation: fadeUp 0.8s ease both; }
    .admin-panel { animation-delay: 0.1s; }
    .card { animation: fadeUp 0.6s ease both; }
    .card.reveal { animation: fadeUp 0.6s cubic-bezier(0.23,1,0.32,1) both; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(232,228,223,0.15); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(232,228,223,0.3); }
  </style>
</head>
<body>

  <!-- AUTH CHECK -->
  <div class="auth-required" id="authRequired">
    <div class="auth-box">
      <div class="auth-title">需要授权</div>
      <div class="auth-text">请先在展示页登录</div>
      <button class="auth-btn" onclick="window.location.href='index.html'">返回展示页</button>
    </div>
  </div>

  <header>
    <div class="header-inner">
      <div class="admin-badge"><span class="dot"></span>管理后台</div>
      <h1 class="site-title">好明<em>设计</em></h1>
    </div>
  </header>

  <div class="admin-panel">
    <!-- Upload -->
    <div class="panel-card">
      <div class="panel-title">↑ 上传新作品</div>
      <div class="upload-box" id="uploadBox">
        <input type="file" id="fileInput" multiple accept="image/*">
        <div class="upload-icon">↑</div>
        <div class="upload-text">拖拽或点击上传图片</div>
        <div class="upload-hint">JPG · PNG · WEBP · 自动识别分类</div>
        <div class="upload-progress" id="uploadProgress"></div>
      </div>
    </div>

    <!-- Quick Add -->
    <div class="panel-card">
      <div class="panel-title">+ 添加已有链接</div>
      <div class="quick-add">
        <input type="text" id="manualUrl" placeholder="粘贴 ImgBB 图片链接…">
        <input type="text" id="manualTitle" placeholder="作品标题（选填）">
        <div class="tag-select" id="tagSelect">
          <span class="tag-option selected" data-tag="photography">影像</span>
          <span class="tag-option" data-tag="main-image">主图</span>
          <span class="tag-option" data-tag="sub-image">副图</span>
          <span class="tag-option" data-tag="aplus">A+ Content</span>
        </div>
        <button class="btn" id="addManualBtn" disabled>添加到作品集</button>
      </div>
    </div>

    <!-- Manifest -->
    <div class="panel-card manifest-section">
      <div class="panel-title">📋 作品清单（自动同步到外网）</div>
      <textarea id="manifestOutput" readonly placeholder="上传作品后，清单会自动同步到云端…"></textarea>
      <div class="btn-row">
        <button onclick="copyManifest()">📋 复制清单</button>
        <button onclick="downloadManifest()">💾 下载 manifest.json</button>
        <button class="btn-primary" onclick="document.getElementById('manifestInput').click()">📂 导入清单</button>
      </div>
      <input type="file" id="manifestInput" accept=".json" style="display:none" onchange="doImportManifest(this)">
    </div>
  </div>

  <main class="gallery-wrapper">
    <div class="masonry" id="masonry"></div>
  </main>

  <div class="toast" id="toast"></div>

  <footer>好明设计 · 管理后台 · 仅限授权用户</footer>

  <script>
    // AUTH CHECK
    const AUTH_KEY = 'haoming_auth';
    if (!localStorage.getItem(AUTH_KEY)) {
      document.getElementById('authRequired').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    } else {
      document.getElementById('authRequired').classList.add('hidden');
    }

    // LOGOUT
    function logout() {
      localStorage.removeItem(AUTH_KEY);
      window.location.href = 'index.html';
    }

    // CONFIG
    const IMGBB_API_KEY = '2c38d36238be760dde2abd6a3d8ebaee';
    const STORAGE_KEY = 'haoming_works';
    const GH_TOKEN_KEY = 'haoming_gh_token';
    const GH_OWNER = 'z1832698917';
    const GH_REPO = 'haoming-design';
    const GH_BRANCH = 'main';

    let works = [];
    let currentFilter = 'all';
    let selectedTag = 'photography';
    let isUploading = false;
    const $ = id => document.getElementById(id);
    const masonry = $('masonry');

    // PERSISTENCE
    function saveWorks() {
      const data = works.map(w => ({src:w.src,title:w.title,tags:w.tags,h:w.colors.h,s:w.colors.s,l:w.colors.l}));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      updateManifest();
      pushToGitHub();
    }

    function loadWorks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        data.forEach(item => addWork(item.src, item.title, item.tags, item.h, false));
      } catch(e){}
    }

    // COLOR
    function extractColors(img) {
      try {
        const c = document.createElement('canvas');
        const ctx = c.getContext('2d');
        const size = 60;
        c.width = c.height = size;
        ctx.drawImage(img,0,0,size,size);
        const d = ctx.getImageData(0,0,size,size).data;
        let rS=0,gS=0,bS=0,cnt=0;
        for (let i=0;i<d.length;i+=16){rS+=d[i];gS+=d[i+1];bS+=d[i+2];cnt++;}
        if(!cnt) throw 0;
        const hsl = rgbToHsl(Math.round(rS/cnt),Math.round(gS/cnt),Math.round(bS/cnt));
        return{h:Math.round(hsl[0]),s:Math.round(hsl[1]*100),l:Math.round(hsl[2]*100)};
      } catch(e){return{h:220,s:20,l:15};}
    }

    function rgbToHsl(r,g,b) {
      r/=255;g/=255;b/=255;
      const max=Math.max(r,g,b),min=Math.min(r,g,b);
      let h,s,l=(max+min)/2;
      if(max===min){h=s=0;}
      else{
        const d=max-min;
        s=l>0.5?d/(2-max-min):d/(max+min);
        switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}
      }
      return[h*360,s,l];
    }

    // ADD WORK
    function addWork(src,title,tags,forcedHue,doSave=true) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function() {
        const colors = extractColors(img);
        if(forcedHue!==undefined) colors.h = forcedHue;
        const id = Date.now()+Math.random();

        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.tags = tags.join(',');
        card.style.animationDelay = (Math.random()*0.3)+'s';

        const tagsHtml = tags.map(t=>`<span class="card-tag">${t}</span>`).join('');
        card.innerHTML = `<img src="${src}" alt="${title.replace(/"/g,'&quot;')}" loading="lazy"><div class="card-overlay"><div class="card-info"><div class="card-title">${title.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>${tagsHtml}</div><div class="card-actions"><button class="card-btn copy-btn" title="复制链接">🔗</button><button class="card-btn" title="删除" data-id="${id}">✕</button></div></div>`;

        card.addEventListener('click',e=>{if(!e.target.classList.contains('card-btn')) {}});
        card.querySelector('.copy-btn').addEventListener('click',e=>{e.stopPropagation();navigator.clipboard.writeText(src).then(()=>toast('链接已复制','success'));});
        card.querySelector('[title="删除"]').addEventListener('click',e=>{e.stopPropagation();deleteWork(id);});

        masonry.appendChild(card);
        works.push({id,src,title,tags,colors,element:card});

        if(doSave) saveWorks();
        updateStats();
      };
      img.onerror = function(){};
      img.src = src;
    }

    function deleteWork(id) {
      const idx = works.findIndex(w=>w.id===id);
      if(idx===-1) return;
      const card = works[idx].element;
      card.style.transition = 'opacity 0.4s, transform 0.4s';
      card.style.opacity = '0';
      card.style.transform = 'scale(0.8)';
      setTimeout(() => {
        card.remove();
        works.splice(idx,1);
        updateStats();
        saveWorks();
      }, 400);
    }

    function updateStats() {
      updateManifest();
    }

    // UPLOAD
    const fileInput = $('fileInput');
    const uploadBox = $('uploadBox');
    const uploadProgress = $('uploadProgress');

    uploadBox.addEventListener('dragover',e=>{e.preventDefault();if(!isUploading) uploadBox.classList.add('drag-over');});
    uploadBox.addEventListener('dragleave',()=>uploadBox.classList.remove('drag-over'));
    uploadBox.addEventListener('drop',e=>{e.preventDefault();uploadBox.classList.remove('drag-over');if(!isUploading) handleFiles(e.dataTransfer.files);});
    fileInput.addEventListener('change',e=>{if(!isUploading) handleFiles(e.target.files);});

    async function uploadToImgBB(file) {
      return new Promise((resolve,reject)=>{
        const reader = new FileReader();
        reader.onload = async e => {
          const base64 = e.target.result.split(',')[1];
          const fd = new FormData();
          fd.append('key',IMGBB_API_KEY);
          fd.append('image',base64);
          fd.append('name',file.name);
          fetch('https://api.imgbb.com/1/upload',{method:'POST',body:fd})
            .then(r=>r.json())
            .then(data=>{if(data.success) resolve(data.data.url); else reject(new Error(data.error?.message||'上传失败'));})
            .catch(reject);
        };
        reader.onerror = ()=>reject(new Error('读取文件失败'));
        reader.readAsDataURL(file);
      });
    }

    function parseTagsFromName(name) {
      name = name.toLowerCase();
      if(name.includes('main')||name.includes('主图')) return ['main-image','photography'];
      if(name.includes('sub')||name.includes('副图')) return ['sub-image','photography'];
      if(name.includes('a+')||name.includes('aplus')||name.includes('A+')) return ['aplus','photography'];
      return ['photography'];
    }

    function parseTitleFromName(name) {
      return name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').replace(/main|sub|主图|副图|aplus|a\+/gi,'').trim()||`作品 ${works.length+1}`;
    }

    async function handleFiles(files) {
      const allowed = Array.from(files).filter(f=>f.type.indexOf('image')===0);
      if(!allowed.length) return;
      isUploading = true;
      let done=0,ok=0;
      for(const file of allowed) {
        try {
          const url = await uploadToImgBB(file);
          ok++;
          addWork(url, parseTitleFromName(file.name), parseTagsFromName(file.name));
        } catch(err) {
          toast(`${file.name} 上传失败`, 'error');
        }
        done++;
        uploadProgress.style.width = ((done/allowed.length)*100)+'%';
      }
      isUploading = false;
      uploadProgress.style.width = '0%';
      setTimeout(()=>toast(`✅ ${ok} 张作品已添加，自动同步到云端`, 'success'), 300);
    }

    // MANUAL ADD
    $('tagSelect').addEventListener('click',e=>{
      if(!e.target.classList.contains('tag-option')) return;
      document.querySelectorAll('.tag-option').forEach(o=>o.classList.remove('selected'));
      e.target.classList.add('selected');
      selectedTag = e.target.dataset.tag;
    });

    const manualUrl = $('manualUrl');
    const addManualBtn = $('addManualBtn');
    manualUrl.addEventListener('input',()=>{addManualBtn.disabled = !manualUrl.value.trim();});
    addManualBtn.addEventListener('click',()=>{
      const url = manualUrl.value.trim();
      if(!url) return;
      const title = $('manualTitle').value.trim()||`作品 ${works.length+1}`;
      addWork(url, title, [selectedTag]);
      manualUrl.value = '';
      $('manualTitle').value = '';
      addManualBtn.disabled = true;
      toast('作品已添加', 'success');
    });

    // MANIFEST
    function updateManifest() {
      const data = {version:Date.now(),works:works.map(w=>({src:w.src,title:w.title,tags:w.tags}))};
      $('manifestOutput').value = JSON.stringify(data,null,2);
    }

    function copyManifest() {
      navigator.clipboard.writeText($('manifestOutput').value).then(()=>toast('清单已复制到剪贴板','success'));
    }

    function downloadManifest() {
      const blob = new Blob([$('manifestOutput').value],{type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'manifest.json';
      a.click();
      URL.revokeObjectURL(a.href);
      toast('manifest.json 已下载','success');
    }

    function doImportManifest(input) {
      const file = input.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          if(!data.works) throw new Error('格式错误');
          const existing = {};
          for(let i=0;i<works.length;i++) existing[works[i].src] = true;
          let added=0;
          data.works.forEach(item=>{
            if(!existing[item.src]){
              addWork(item.src,item.title||'作品',item.tags||['photography']);
              added++;
            }
          });
          toast('导入完成 · '+added+' 张新作品','success');
        } catch(err){
          toast('清单格式错误，请检查 JSON 文件','error');
        }
      };
      reader.readAsText(file);
      input.value = '';
    }

    // GITHUB SYNC
    async function pushToGitHub() {
      const token = localStorage.getItem(GH_TOKEN_KEY);
      if(!token) return;
      const data = {version:Date.now(),works:works.map(w=>({src:w.src,title:w.title,tags:w.tags}))};
      const json = JSON.stringify(data,null,2);
      try {
        const shaResp = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/manifest.json?ref=${GH_BRANCH}`,{
          headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'}
        });
        const shaData = await shaResp.json();
        const sha = shaData.sha;
        const body = JSON.stringify({
          message:'Auto sync from 好明设计 admin',
          content:btoa(unescape(encodeURIComponent(json))),
          sha:sha
        });
        const resp = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/manifest.json`,{
          method:'PUT',
          headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
          body:body
        });
        if(resp.ok) {
          toast('已同步到云端，展示页自动更新','success');
        } else {
          const err = await resp.json();
          toast('同步失败：'+err.message,'error');
        }
      } catch(e) {
        toast('同步失败：'+e.message,'error');
      }
    }

    function toast(msg,type='') {
      const el = $('toast');
      el.textContent = msg;
      el.className = 'toast show'+(type?' '+type:'');
      clearTimeout(el._timer);
      el._timer = setTimeout(()=>el.classList.remove('show'),3000);
    }

    loadWorks();
  </script>
</body>
</html>
