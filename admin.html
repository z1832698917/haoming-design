<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>好明设计 · 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary-hue: 220;
      --primary-sat: 20%;
      --primary-lig: 8%;
      --accent: hsl(var(--primary-hue), 60%, 65%);
      --text-primary: #e8e4df;
      --text-secondary: rgba(232, 228, 223, 0.5);
      --bg-dark: hsl(var(--primary-hue), var(--primary-sat), var(--primary-lig));
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 0%, hsla(var(--primary-hue), 50%, 40%, 0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* AUTH SCREEN */
    .auth-screen {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
    }

    .auth-screen.hidden {
      display: none;
    }

    .auth-box {
      background: rgba(20, 18, 15, 0.9);
      border: 1px solid rgba(232, 228, 223, 0.15);
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 360px;
      width: 90%;
      text-align: center;
    }

    .auth-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    .auth-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(232, 228, 223, 0.12);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      color: var(--text-primary);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      margin-bottom: 1rem;
      transition: border-color 0.3s;
    }

    .auth-input:focus {
      border-color: var(--accent);
    }

    .auth-input::placeholder {
      color: rgba(232, 228, 223, 0.25);
    }

    .auth-btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 0.85rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .auth-btn:hover {
      opacity: 0.8;
    }

    .auth-error {
      color: #ff6b6b;
      font-size: 0.75rem;
      margin-top: 0.5rem;
      display: none;
    }

    .auth-error.show {
      display: block;
    }

    /* MAIN CONTENT */
    header {
      position: relative;
      z-index: 10;
      padding: 3rem 2rem 1.5rem;
      text-align: center;
    }

    .site-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 700;
    }

    .site-title em {
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }

    .admin-badge {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.3rem 0.8rem;
      border: 1px solid var(--accent);
      border-radius: 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }

    .section {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(232, 228, 223, 0.08);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(232, 228, 223, 0.12);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text-primary);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent);
    }

    .form-input::placeholder, .form-textarea::placeholder {
      color: rgba(232, 228, 223, 0.25);
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    .btn-group {
      display: flex;
      gap: 0.5rem;
    }

    .btn {
      flex: 1;
      padding: 0.75rem;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
      border: 1px solid rgba(232, 228, 223, 0.15);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-secondary);
    }

    .btn:hover {
      opacity: 0.8;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
      border-color: transparent;
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .upload-area {
      border: 2px dashed rgba(232, 228, 223, 0.2);
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }

    .upload-area:hover, .upload-area.drag-over {
      border-color: var(--accent);
      background: hsla(var(--primary-hue), 50%, 50%, 0.05);
    }

    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .upload-text {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .upload-hint {
      font-size: 0.65rem;
      color: rgba(232, 228, 223, 0.3);
      margin-top: 0.3rem;
    }

    .collections-list {
      display: grid;
      gap: 1rem;
    }

    .collection-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(232, 228, 223, 0.08);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s;
    }

    .collection-item:hover {
      border-color: rgba(232, 228, 223, 0.15);
      background: rgba(255, 255, 255, 0.04);
    }

    .collection-info h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      margin-bottom: 0.3rem;
    }

    .collection-info p {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    .collection-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-small {
      padding: 0.5rem 1rem;
      font-size: 0.7rem;
      border-radius: 6px;
    }

    .btn-delete {
      background: rgba(220, 60, 60, 0.2);
      border-color: rgba(220, 60, 60, 0.4);
      color: #ff8080;
    }

    .btn-delete:hover {
      background: rgba(220, 60, 60, 0.3);
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(20, 18, 15, 0.95);
      border: 1px solid rgba(232, 228, 223, 0.15);
      color: var(--text-primary);
      padding: 0.75rem 1.5rem;
      border-radius: 3rem;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      z-index: 2000;
      transition: transform 0.3s, opacity 0.3s;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    footer {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      font-size: 0.65rem;
      color: var(--text-secondary);
      border-top: 1px solid rgba(232, 228, 223, 0.06);
    }
  </style>
</head>
<body>

  <!-- AUTH SCREEN -->
  <div class="auth-screen" id="authScreen">
    <div class="auth-box">
      <div class="auth-title">好明设计</div>
      <input type="text" class="auth-input" id="authUser" placeholder="账号" autocomplete="off">
      <input type="password" class="auth-input" id="authPass" placeholder="密码" autocomplete="off">
      <button class="auth-btn" onclick="doAuth()">进入管理</button>
      <div class="auth-error" id="authError"></div>
    </div>
  </div>

  <header>
    <h1 class="site-title">好明<em>设计</em></h1>
    <div class="admin-badge">管理后台</div>
  </header>

  <div class="container">
    <!-- Add Collection -->
    <div class="section">
      <div class="section-title">➕ 新建作品集</div>
      
      <div class="form-group">
        <label class="form-label">作品集名称</label>
        <input type="text" class="form-input" id="collectionTitle" placeholder="例：产品摄影 Vol.1">
      </div>

      <div class="form-group">
        <label class="form-label">分类</label>
        <select class="form-select" id="collectionType">
          <option value="photography">摄影</option>
          <option value="ecommerce">跨境电商作品</option>
          <option value="typography">排版作品</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">上传图片</label>
        <div class="upload-area" id="uploadArea">
          <input type="file" id="fileInput" multiple accept="image/*">
          <div class="upload-icon">↑</div>
          <div class="upload-text">拖拽或点击上传</div>
          <div class="upload-hint">支持 JPG · PNG · WEBP</div>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="createBtn" disabled>创建作品集</button>
      </div>
    </div>

    <!-- Collections List -->
    <div class="section">
      <div class="section-title">📚 已有作品集</div>
      <div class="collections-list" id="collectionsList">
        <p style="color: var(--text-secondary); text-align: center; padding: 2rem;">暂无作品集</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <footer>好明设计 · 管理后台 · 仅限授权用户</footer>

  <script>
    const AUTH_USER = 'z1832698917';
    const AUTH_PASS = '123A123a123B';
    const AUTH_KEY = 'haoming_auth_admin';
    const IMGBB_KEY = '2c38d36238be760dde2abd6a3d8ebaee';
    const STORAGE_KEY = 'haoming_collections';
    const GH_TOKEN_KEY = 'haoming_gh_token_admin';
    const GH_OWNER = 'z1832698917';
    const GH_REPO = 'haoming-design';

    let collections = { photography: [], ecommerce: [], typography: [] };
    let uploadedImages = [];

    // AUTH
    function doAuth() {
      const user = document.getElementById('authUser').value.trim();
      const pass = document.getElementById('authPass').value;
      const error = document.getElementById('authError');

      if (user === AUTH_USER && pass === AUTH_PASS) {
        localStorage.setItem(AUTH_KEY, 'true');
        document.getElementById('authScreen').classList.add('hidden');
        init();
      } else {
        error.textContent = '账号或密码错误';
        error.classList.add('show');
      }
    }

    document.getElementById('authPass').addEventListener('keypress', e => {
      if (e.key === 'Enter') doAuth();
    });

    function init() {
      loadCollections();
      setupUpload();
      setupForm();
    }

    // UPLOAD
    function setupUpload() {
      const uploadArea = document.getElementById('uploadArea');
      const fileInput = document.getElementById('fileInput');

      uploadArea.addEventListener('dragover', e => {
        e.preventDefault();
        uploadArea.classList.add('drag-over');
      });

      uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('drag-over');
      });

      uploadArea.addEventListener('drop', e => {
        e.preventDefault();
        uploadArea.classList.remove('drag-over');
        handleFiles(e.dataTransfer.files);
      });

      fileInput.addEventListener('change', e => {
        handleFiles(e.target.files);
      });
    }

    async function uploadToImgBB(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async e => {
          const base64 = e.target.result.split(',')[1];
          const fd = new FormData();
          fd.append('key', IMGBB_KEY);
          fd.append('image', base64);
          fd.append('name', file.name);

          fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(data => {
              if (data.success) resolve(data.data.url);
              else reject(new Error(data.error?.message || '上传失败'));
            })
            .catch(reject);
        };
        reader.onerror = () => reject(new Error('读取文件失败'));
        reader.readAsDataURL(file);
      });
    }

    async function handleFiles(files) {
      const allowed = Array.from(files).filter(f => f.type.indexOf('image') === 0);
      if (!allowed.length) return;

      uploadedImages = [];
      let done = 0, ok = 0;

      for (const file of allowed) {
        try {
          const url = await uploadToImgBB(file);
          ok++;
          uploadedImages.push(url);
        } catch (err) {
          toast(`${file.name} 上传失败`, 'error');
        }
        done++;
      }

      document.getElementById('createBtn').disabled = uploadedImages.length === 0;
      if (ok > 0) {
        toast(`✅ ${ok} 张图片已上传`, 'success');
      }
    }

    // FORM
    function setupForm() {
      document.getElementById('createBtn').addEventListener('click', createCollection);
    }

    function createCollection() {
      const title = document.getElementById('collectionTitle').value.trim();
      const type = document.getElementById('collectionType').value;

      if (!title || uploadedImages.length === 0) {
        toast('请填写标题并上传图片', 'error');
        return;
      }

      const collection = {
        id: Date.now(),
        title: title,
        images: uploadedImages,
        dominantColor: { h: 220, s: 20, l: 8 }
      };

      collections[type].push(collection);
      saveCollections();
      pushToGitHub();

      // Reset form
      document.getElementById('collectionTitle').value = '';
      document.getElementById('fileInput').value = '';
      uploadedImages = [];
      document.getElementById('createBtn').disabled = true;

      toast('✅ 作品集已创建并同步到云端', 'success');
    }

    // PERSISTENCE
    function saveCollections() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(collections));
      renderCollections();
    }

    function loadCollections() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) collections = JSON.parse(raw);
      } catch (e) {}
      renderCollections();
    }

    function renderCollections() {
      const list = document.getElementById('collectionsList');
      let html = '';

      Object.entries(collections).forEach(([type, items]) => {
        items.forEach(collection => {
          html += `
            <div class="collection-item">
              <div class="collection-info">
                <h3>${collection.title}</h3>
                <p>${collection.images.length} 张图片 · ${type}</p>
              </div>
              <div class="collection-actions">
                <button class="btn btn-small btn-delete" onclick="deleteCollection('${type}', ${collection.id})">删除</button>
              </div>
            </div>
          `;
        });
      });

      list.innerHTML = html || '<p style="color: var(--text-secondary); text-align: center; padding: 2rem;">暂无作品集</p>';
    }

    function deleteCollection(type, id) {
      if (!confirm('确定删除此作品集？')) return;
      collections[type] = collections[type].filter(c => c.id !== id);
      saveCollections();
      pushToGitHub();
      toast('✅ 作品集已删除', 'success');
    }

    // GITHUB SYNC
    async function pushToGitHub() {
      const token = localStorage.getItem(GH_TOKEN_KEY);
      if (!token) return;

      const manifest = { version: Date.now(), collections: collections };

      try {
        const shaResp = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/manifest.json?ref=main`, {
          headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
        });
        const shaData = await shaResp.json();
        const sha = shaData.sha;

        const body = JSON.stringify({
          message: 'Auto sync from 好明设计 admin',
          content: btoa(unescape(encodeURIComponent(JSON.stringify(manifest, null, 2)))),
          sha: sha
        });

        const resp = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/manifest.json`, {
          method: 'PUT',
          headers: {
            Authorization: `Bearer ${token}`,
            Accept: 'application/vnd.github+json',
            'Content-Type': 'application/json'
          },
          body: body
        });

        if (resp.ok) {
          toast('已同步到云端', 'success');
        }
      } catch (e) {}
    }

    // TOAST
    function toast(msg, type = '') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast show';
      clearTimeout(el._timer);
      el._timer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    // Check auth on load
    if (localStorage.getItem(AUTH_KEY)) {
      document.getElementById('authScreen').classList.add('hidden');
      init();
    }
  </script>
</body>
</html>
