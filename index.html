<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>好明设计 - 作品集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary-hue: 220;
      --primary-sat: 20%;
      --primary-lig: 8%;
      --accent: hsl(var(--primary-hue), 60%, 65%);
      --text-primary: #e8e4df;
      --text-secondary: rgba(232, 228, 223, 0.5);
      --bg-dark: hsl(var(--primary-hue), var(--primary-sat), var(--primary-lig));
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
      transition: background-color 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 0%, hsla(var(--primary-hue), 50%, 40%, 0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 100%, hsla(calc(var(--primary-hue) + 30), 40%, 30%, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      transition: background 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    header {
      position: relative;
      z-index: 10;
      padding: 4rem 2rem 2rem;
      text-align: center;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .site-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .site-title em {
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
      transition: color 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .site-subtitle {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .color-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .color-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 20px var(--accent);
      transition: all 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .color-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    .section {
      margin-bottom: 8rem;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 700;
      margin-bottom: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(232, 228, 223, 0.1);
      letter-spacing: -0.01em;
    }

    .section-title em {
      color: var(--accent);
      font-style: italic;
      font-weight: 400;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .collection {
      position: relative;
      cursor: pointer;
      height: 320px;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(232, 228, 223, 0.08);
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .collection:hover {
      border-color: rgba(232, 228, 223, 0.2);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .collection-preview {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .collection:hover .collection-preview {
      opacity: 0;
      pointer-events: none;
    }

    .collection-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .collection:hover .collection-preview img {
      transform: scale(1.05);
    }

    .collection-title {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5rem;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      z-index: 5;
    }

    .collection-count {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(0, 0, 0, 0.5);
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      z-index: 5;
      backdrop-filter: blur(10px);
    }

    .collection-images {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 0.5rem;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 16px;
    }

    .collection:hover .collection-images {
      opacity: 1;
      pointer-events: all;
    }

    .collection-image {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      transform: scale(0.9);
      opacity: 0;
      animation: imageReveal 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes imageReveal {
      to { transform: scale(1); opacity: 1; }
    }

    .collection-image:nth-child(1) { animation-delay: 0s; }
    .collection-image:nth-child(2) { animation-delay: 0.05s; }
    .collection-image:nth-child(3) { animation-delay: 0.1s; }
    .collection-image:nth-child(4) { animation-delay: 0.15s; }
    .collection-image:nth-child(5) { animation-delay: 0.2s; }
    .collection-image:nth-child(6) { animation-delay: 0.25s; }

    .collection-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .collection-image:hover img {
      transform: scale(1.1);
    }

    .collection-image-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0);
      transition: background 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .collection-image:hover .collection-image-overlay {
      background: rgba(0, 0, 0, 0.4);
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox-content {
      position: relative;
      max-width: 90vw;
      max-height: 85vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.6);
      transform: scale(0.9);
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .lightbox.open .lightbox-img {
      transform: scale(1);
    }

    .lightbox-close {
      position: absolute;
      top: 2rem;
      right: 2rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      backdrop-filter: blur(10px);
    }

    .lightbox-close:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: rotate(90deg);
    }

    .login-trigger {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 100;
      width: 24px;
      height: 24px;
      cursor: pointer;
      opacity: 0.15;
      transition: opacity 0.3s;
      border: 1px solid rgba(232, 228, 223, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .login-trigger:hover {
      opacity: 0.4;
    }

    footer {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 3rem 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--text-secondary);
      border-top: 1px solid rgba(232, 228, 223, 0.06);
    }

    @media (max-width: 768px) {
      .gallery {
        grid-template-columns: 1fr;
      }

      .collection-images {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <h1 class="site-title">好明<em>设计</em></h1>
      <p class="site-subtitle">影像 · 视觉 · 创意</p>
      <div class="color-indicator">
        <div class="color-dot" id="colorDot"></div>
        <span class="color-label">主色调</span>
      </div>
    </div>
  </header>

  <div class="container">
    <!-- Photography Section -->
    <div class="section" id="photographySection">
      <h2 class="section-title">摄<em>影</em></h2>
      <div class="gallery" id="photographyGallery"></div>
    </div>

    <!-- E-commerce Section -->
    <div class="section" id="ecommerceSection" style="display: none;">
      <h2 class="section-title">跨境电商<em>作品</em></h2>
      <div class="gallery" id="ecommerceGallery"></div>
    </div>

    <!-- Typography Section -->
    <div class="section" id="typographySection" style="display: none;">
      <h2 class="section-title">排<em>版</em>作品</h2>
      <div class="gallery" id="typographyGallery"></div>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <div class="lightbox-content">
      <img class="lightbox-img" id="lightboxImg" src="" alt="">
    </div>
  </div>

  <div class="login-trigger" id="loginTrigger" onclick="window.location.href='admin.html'" title="管理">⚙</div>

  <footer>好明设计 · 影像 · 视觉 · 创意</footer>

  <script>
    const GITHUB_OWNER = 'z1832698917';
    const GITHUB_REPO = 'haoming-design';
    const GITHUB_BRANCH = 'main';

    let collections = {
      photography: [],
      ecommerce: [],
      typography: []
    };

    let currentHue = 220;
    let currentSat = 20;
    let currentLig = 8;

    // Load data from GitHub
    async function loadFromGitHub() {
      try {
        const resp = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/manifest.json?ref=${GITHUB_BRANCH}`, {
          headers: { 'Accept': 'application/vnd.github+json' }
        });
        if (!resp.ok) return;
        const data = await resp.json();
        const manifest = JSON.parse(atob(data.content));
        
        if (manifest && manifest.collections) {
          collections = manifest.collections;
          renderGalleries();
        }
      } catch (e) {
        console.error('Failed to load from GitHub:', e);
      }
    }

    function renderGalleries() {
      renderGallery('photography', collections.photography);
      renderGallery('ecommerce', collections.ecommerce);
      renderGallery('typography', collections.typography);

      // Show/hide sections
      document.getElementById('photographySection').style.display = collections.photography.length ? 'block' : 'none';
      document.getElementById('ecommerceSection').style.display = collections.ecommerce.length ? 'block' : 'none';
      document.getElementById('typographySection').style.display = collections.typography.length ? 'block' : 'none';
    }

    function renderGallery(type, items) {
      const gallery = document.getElementById(type + 'Gallery');
      gallery.innerHTML = '';

      items.forEach((collection, idx) => {
        const collectionEl = document.createElement('div');
        collectionEl.className = 'collection';
        collectionEl.style.animationDelay = (idx * 0.1) + 's';

        const previewImg = collection.images && collection.images[0] ? collection.images[0] : '';
        
        collectionEl.innerHTML = `
          <div class="collection-preview">
            <img src="${previewImg}" alt="${collection.title}" loading="lazy">
          </div>
          <div class="collection-title">${collection.title}</div>
          <div class="collection-count">${collection.images ? collection.images.length : 0} 张</div>
          <div class="collection-images">
            ${(collection.images || []).map((img, i) => `
              <div class="collection-image" onclick="openLightbox('${img}', event)">
                <img src="${img}" alt="Image ${i + 1}" loading="lazy">
                <div class="collection-image-overlay">🔍</div>
              </div>
            `).join('')}
          </div>
        `;

        // Color change on hover
        collectionEl.addEventListener('mouseenter', () => {
          if (collection.dominantColor) {
            updateThemeColor(collection.dominantColor.h, collection.dominantColor.s, collection.dominantColor.l);
          }
        });

        collectionEl.addEventListener('mouseleave', () => {
          resetThemeColor();
        });

        gallery.appendChild(collectionEl);
      });
    }

    function updateThemeColor(h, s, l) {
      document.documentElement.style.setProperty('--primary-hue', h);
      document.documentElement.style.setProperty('--primary-sat', s + '%');
      document.documentElement.style.setProperty('--primary-lig', l + '%');
      
      const dot = document.getElementById('colorDot');
      dot.style.background = `hsl(${h}, ${s}%, ${l}%)`;
      dot.style.boxShadow = `0 0 20px hsl(${h}, ${s}%, ${l}%)`;
    }

    function resetThemeColor() {
      updateThemeColor(220, 20, 8);
    }

    function openLightbox(src, event) {
      event.stopPropagation();
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('open');
    }

    document.getElementById('lightboxClose').addEventListener('click', () => {
      document.getElementById('lightbox').classList.remove('open');
    });

    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target === document.getElementById('lightbox')) {
        document.getElementById('lightbox').classList.remove('open');
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('lightbox').classList.remove('open');
      }
    });

    // Load data on startup
    loadFromGitHub();
  </script>
</body>
</html>
